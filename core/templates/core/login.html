{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Staff Login | NGS</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --navy-dk: #0d1520; --navy: #1a2940; --navy-lt: #2C3947;
      --blue: #547A95; --gold: #C2A56D; --gold-lt: #D2B985; --gold-pale: #E5D6B7;
      --white: #fff; --text: #2C3947; --muted: #5E6B77;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      background: linear-gradient(160deg, #0d1520 0%, #1a2940 50%, #0d1520 100%);
      display: flex; align-items: center; justify-content: center;
      position: relative; overflow: hidden;
    }

    /* Background orbs */
    .orb { position: absolute; border-radius: 50%; filter: blur(80px); pointer-events: none; }
    .orb-1 { width: 400px; height: 400px; background: rgba(194,165,109,0.08); top: -10%; left: -10%; }
    .orb-2 { width: 300px; height: 300px; background: rgba(84,122,149,0.1); bottom: -5%; right: -5%; }

    /* Card */
    .login-card {
      background: rgba(20, 30, 45, 0.9);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(194,165,109,0.2);
      border-radius: 20px;
      padding: 52px 48px;
      width: 100%; max-width: 440px;
      position: relative; z-index: 1;
      box-shadow: 0 40px 100px rgba(0,0,0,0.5);
    }
    .login-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0;
      height: 2px; border-radius: 20px 20px 0 0;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
    }

    /* Logo */
    .login-logo { text-align: center; margin-bottom: 36px; }
    .login-logo img {
      width: 90px; height: 90px; border-radius: 50%;
      border: 2px solid var(--gold); object-fit: cover;
      box-shadow: 0 0 40px rgba(194,165,109,0.3);
      margin-bottom: 16px;
    }
    .login-logo h1 {
      font-family: 'Cinzel', serif; color: var(--gold-lt);
      font-size: 1.1rem; letter-spacing: 0.06em;
    }
    .login-logo p {
      color: rgba(229,214,183,0.5); font-size: 0.75rem;
      letter-spacing: 0.12em; text-transform: uppercase; margin-top: 4px;
    }

    /* Badge */
    .login-badge {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(194,165,109,0.12); color: var(--gold-lt);
      border: 1px solid rgba(194,165,109,0.25); border-radius: 20px;
      font-size: 0.7rem; font-weight: 600; letter-spacing: 0.1em;
      text-transform: uppercase; padding: 5px 14px;
      margin-bottom: 28px;
    }

    /* Form */
    .form-group { margin-bottom: 20px; }
    .form-group label {
      display: block; font-size: 0.73rem; font-weight: 600;
      color: var(--gold); text-transform: uppercase; letter-spacing: 0.08em;
      margin-bottom: 8px;
    }
    .form-group input {
      width: 100%; padding: 13px 16px;
      background: rgba(255,255,255,0.05);
      border: 1.5px solid rgba(194,165,109,0.2);
      border-radius: 8px; font-size: 0.9rem;
      font-family: 'Inter', sans-serif;
      color: var(--white); outline: none;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    }
    .form-group input::placeholder { color: rgba(229,214,183,0.3); }
    .form-group input:focus {
      border-color: var(--gold);
      background: rgba(194,165,109,0.07);
      box-shadow: 0 0 0 4px rgba(194,165,109,0.1);
    }

    /* Submit */
    .btn-login {
      width: 100%; padding: 14px;
      background: linear-gradient(135deg, var(--gold), var(--gold-lt));
      color: var(--navy-dk); border: none; border-radius: 8px;
      font-size: 0.9rem; font-weight: 700; letter-spacing: 0.1em;
      text-transform: uppercase; cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: all 0.3s; margin-top: 8px;
    }
    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 36px rgba(194,165,109,0.45);
    }

    /* Error */
    .error-msg {
      background: rgba(180,30,30,0.15);
      border: 1px solid rgba(180,30,30,0.3);
      border-left: 3px solid #f44336;
      border-radius: 8px; padding: 12px 16px;
      color: #ffb3b3; font-size: 0.85rem;
      margin-bottom: 20px; display: flex; align-items: center; gap: 8px;
    }

    /* Back link */
    .back-link {
      display: block; text-align: center; margin-top: 24px;
      color: rgba(229,214,183,0.4); font-size: 0.82rem;
      text-decoration: none; transition: color 0.2s;
    }
    .back-link:hover { color: var(--gold-pale); }

    /* Divider */
    .divider { display: flex; align-items: center; gap: 12px; margin: 24px 0; }
    .divider-line { flex: 1; height: 1px; background: rgba(194,165,109,0.15); }
    .divider-text { color: rgba(229,214,183,0.3); font-size: 0.75rem; letter-spacing: 0.1em; }

    @media (max-width: 480px) {
      .login-card { padding: 40px 28px; margin: 20px; }
    }
  </style>
</head>
<body>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <div class="login-card">
    <div class="login-logo">
      <img src="{% static 'core/images/logo.jpeg' %}" alt="NGS Logo" />
      <h1>Narasimha Global</h1>
      <p>Service &amp; Solution Pvt. Ltd.</p>
    </div>

    <div style="text-align:center">
      <span class="login-badge">🔒 Staff Portal Login</span>
    </div>

    {% if messages %}
      {% for message in messages %}
        <div class="error-msg">⚠️ {{ message }}</div>
      {% endfor %}
    {% endif %}

    <form method="POST" action="{% url 'login' %}{% if request.GET.next %}?next={{ request.GET.next }}{% endif %}">
      {% csrf_token %}
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" placeholder="Enter your username" required autocomplete="username" />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Enter your password" required autocomplete="current-password" />
      </div>
      <button type="submit" class="btn-login">Login to Portal →</button>
    </form>

    <div class="divider">
      <div class="divider-line"></div>
      <span class="divider-text">NGS</span>
      <div class="divider-line"></div>
    </div>

    <a href="/" class="back-link">← Back to Main Website</a>
  </div>
</body>
</html>
